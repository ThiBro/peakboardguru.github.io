<header class="dark:bg-blackground border-b border-gray-200 dark:border-gray-800 sticky top-0 z-50" style="background: linear-gradient(to right, #ffffff, #fffbeb);">
    <!-- Thin accent line -->
    <div class="h-0.5 w-full bg-gradient-to-r from-transparent via-accent-cyan to-transparent"></div>

    <div class="max-w-7xl mx-auto px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
            <!-- Logo/Home - Desktop: large image, Mobile: smaller image -->
            <a href="{{ '/' | relative_url }}" class="hidden md:block">
                <img src="{{ '/assets/img/logo-header.png' | relative_url }}" alt="{{ site.title }}" style="height: 250px; width: auto; position: fixed; top: -55px; left: 16px;" class="pointer-events-auto z-50">
            </a>
            <a href="{{ '/' | relative_url }}" class="block md:hidden">
                <img src="{{ '/assets/img/logo-header.png' | relative_url }}" alt="{{ site.title }}" style="height: 125px; width: auto; position: fixed; top: -25px; left: 8px;" class="pointer-events-auto z-50">
            </a>

            <!-- Search -->
            <div style="position: fixed; right: 16px; top: 16px; z-index: 50;" class="flex items-center">
                <!-- Search input (hidden by default) -->
                <form id="header-search-form" action="{{ '/search' | relative_url }}" method="get"
                      class="hidden items-center mr-2" onsubmit="return headerSearchSubmit()">
                    <input type="text" name="q" id="header-search-input"
                           placeholder="Search..."
                           class="w-48 md:w-64 px-3 py-1.5 text-sm border border-gray-300 rounded-lg
                                  focus:outline-none focus:ring-2 focus:ring-secondary focus:border-transparent
                                  bg-white dark:bg-blackground dark:border-gray-700 dark:text-light" />
                </form>
                <!-- Search icon button -->
                <button onclick="toggleHeaderSearch()" aria-label="Search"
                        class="text-gray-700 dark:text-gray-300 hover:text-accent-cyan transition-colors p-1">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Reading progress bar -->
    <div id="reading-progress-container" class="h-[3px] w-full opacity-0 transition-opacity duration-300">
        <div id="reading-progress" class="h-full bg-secondary w-0 transition-all duration-150"></div>
    </div>
</header>

<script>
    function toggleHeaderSearch() {
        var form = document.getElementById('header-search-form');
        var input = document.getElementById('header-search-input');
        if (form.classList.contains('hidden')) {
            form.classList.remove('hidden');
            form.classList.add('flex');
            input.focus();
        } else {
            form.classList.add('hidden');
            form.classList.remove('flex');
            input.value = '';
        }
    }

    function headerSearchSubmit() {
        var input = document.getElementById('header-search-input');
        if (!input.value.trim()) return false;
        return true;
    }

    // Close search on Escape
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            var form = document.getElementById('header-search-form');
            if (!form.classList.contains('hidden')) {
                toggleHeaderSearch();
            }
        }
    });

    // Close search when clicking outside
    document.addEventListener('click', function(e) {
        var form = document.getElementById('header-search-form');
        var searchContainer = form ? form.parentElement : null;
        if (searchContainer && !searchContainer.contains(e.target) && !form.classList.contains('hidden')) {
            toggleHeaderSearch();
        }
    });
</script>
