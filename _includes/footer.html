<footer class="mt-24" style="background-color: #9A4400;">

  <div class="mx-auto max-w-7xl px-6 py-12 lg:px-8">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
      <!-- About Section -->
      <div>
        <h3 class="font-heading text-lg font-bold uppercase tracking-tight mb-4 text-white">
          {{ site.title }}
        </h3>
        <p class="text-sm leading-relaxed" style="color: rgba(255,255,255,0.7);">
          Projects, tutorials, and guides for Peakboard development and integration.
        </p>
      </div>

      <!-- Quick Links -->
      <div>
        <h3 class="font-heading text-lg font-bold uppercase tracking-tight mb-4 text-white">

        </h3>
        <ul class="space-y-2.5">
          <li>
            <a href="{{ '/about' | relative_url }}" class="text-sm hover:text-accent-amber transition-colors inline-flex items-center group" style="color: rgba(255,255,255,0.7);">
              <span class="w-1.5 h-1.5 bg-accent-amber mr-2 transition-transform group-hover:scale-125"></span>
              About
            </a>
          </li>
          <li>
            <a href="{{ '/search' | relative_url }}" class="text-sm hover:text-accent-amber transition-colors inline-flex items-center group" style="color: rgba(255,255,255,0.7);">

              Search
            </a>
          </li>
        </ul>
      </div>
    </div>

    <!-- Bottom Bar -->
    <div class="mt-12 pt-8 border-t" style="border-color: rgba(255,255,255,0.2);">
      <p class="text-center text-sm font-medium" style="color: rgba(255,255,255,0.6);">
        &copy; {{ 'now' | date: "%Y" }} {{ site.title }}. All rights reserved.
      </p>
    </div>
  </div>
