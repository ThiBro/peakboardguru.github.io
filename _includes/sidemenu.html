<div class="px-8 mb-16 not-prose lg:mb-0 lg:top-4 lg:border-r-2 lg:border-secondary lg:sticky break-words">

    <a href="{{ '/' | relative_url }}" class="block text-lg font-bold mb-2 break-words {% if page.url == '/index.html' %}text-secondary{% else %}text-gray-900 dark:text-light hover:text-secondary hover:underline{% endif %}">Home</a>
    <a href="{{ '/about' | relative_url }}" class="block text-lg font-bold mb-2 break-words {% if page.url == '/about.html' %}text-secondary{% else %}text-gray-900 dark:text-light hover:text-secondary hover:underline{% endif %}">About</a>

    <p class="font-bold text-lg text-gray-900 dark:text-light mb-2">Archive</p>
    <div class="mb-8">
        {% for post in site.posts %}
          {% assign currentdate = post.date | date: "%B %Y" %}
          {% assign year = post.date | date: "%Y" %}
          {% assign month = post.date | date: "%m" %}
          {% if currentdate != date %}
            <p class="text-base font-medium mb-2 text-gray-900 dark:text-light cursor-pointer hover:text-secondary hover:underline break-words">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 inline mr-2 flex-shrink-0">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M17.25 8.25L21 12m0 0l-3.75 3.75M21 12H3" />
                </svg><span data-date-link="{{ year }}-{{ month }}" class="break-words">{{ currentdate }}</span>
            </p>
            {% assign date = currentdate %}
          {% endif %}
        {% endfor %}
    </div>

</div>
